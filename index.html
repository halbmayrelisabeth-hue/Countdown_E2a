<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>E2a-Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f14;
            --surface: rgba(26, 26, 38, 0.82);
            --surface-strong: rgba(20, 20, 28, 0.95);
            --accent: #00d4aa;
            --accent-dim: #00d4aa33;
            --text: #e8e8ed;
            --text-muted: #a3a3b2;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 4vw, 2rem);
            overflow-x: hidden;
            position: relative;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-dim), transparent),
                radial-gradient(circle at 80% 80%, #1e3a5f22, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #fireworks {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            visibility: hidden;
        }

        #fireworks.active {
            visibility: visible;
        }

        #paragraph-symbols {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .para-symbol {
            position: absolute;
            bottom: -50px;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.15);
            animation: riseUp 12s linear infinite;
        }

        @keyframes riseUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            5% { opacity: 0.15; }
            95% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(100%, 760px);
            padding: clamp(1.1rem, 3vw, 2rem);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(14, 14, 20, 0.6), rgba(14, 14, 20, 0.35));
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            font-weight: 900;
            font-size: clamp(2rem, 9vw, 3.75rem);
            line-height: 1.05;
            letter-spacing: clamp(0.04em, 0.8vw, 0.14em);
            text-transform: uppercase;
            margin-bottom: clamp(1.4rem, 4vw, 2.4rem);
            word-break: break-word;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 25%, #6bcb77 50%, #4d96ff 75%, #ff6b9d 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.3);
        }

        @keyframes titleGlow {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .countdown {
            display: grid;
            gap: 1rem;
        }

        .countdown-item,
        .quote-box {
            background: linear-gradient(145deg, rgba(26, 26, 38, 0.98) 0%, rgba(20, 20, 28, 0.95) 100%);
            border: 1px solid rgba(0, 212, 170, 0.12);
            border-radius: 22px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.32),
                0 0 0 1px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(0, 212, 170, 0.05);
        }

        .countdown-item {
            padding: clamp(1rem, 4vw, 1.5rem);
            text-align: center;
        }

        .countdown-label {
            display: block;
            font-size: clamp(0.9rem, 2.9vw, 1rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .countdown-value {
            display: block;
            font-size: clamp(3rem, 14vw, 5rem);
            line-height: 1;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.55rem;
            word-break: break-word;
        }

        .unit-label {
            display: block;
            font-size: clamp(1rem, 4.6vw, 1.5rem);
            line-height: 1.45;
            color: var(--text-muted);
            max-width: 26ch;
            margin: 0 auto;
            overflow-wrap: anywhere;
        }

        .precise-countdown {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.8rem;
            margin-top: 0.25rem;
        }

        .time-card {
            padding: 1rem 0.8rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            text-align: center;
        }

        .time-value {
            display: block;
            font-size: clamp(1.6rem, 8vw, 2.5rem);
            line-height: 1;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .time-label {
            display: block;
            font-size: clamp(0.82rem, 3vw, 1rem);
            color: var(--text-muted);
            line-height: 1.3;
        }

        .quote-box {
            margin-top: 0.35rem;
            padding: 1.2rem 1.1rem 1.25rem 1.35rem;
            position: relative;
            overflow: hidden;
        }

        .quote-box::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent) 0%, rgba(0, 212, 170, 0.35) 100%);
        }

        .quote-label {
            display: block;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .quote-text {
            font-size: clamp(1rem, 4vw, 1.18rem);
            line-height: 1.75;
            color: rgba(232, 232, 237, 0.92);
            font-weight: 300;
            font-style: italic;
            white-space: normal;
            overflow-wrap: anywhere;
            text-align: center;
        }

        .quote-text::before,
        .quote-text::after {
            font-size: 1.2em;
            color: var(--accent);
            opacity: 0.5;
        }

        .quote-text::before {
            content: '"';
            margin-right: 0.1em;
        }

        .quote-text::after {
            content: '"';
            margin-left: 0.1em;
        }

        @media (max-width: 640px) {
            .container {
                padding: 0.4rem;
                background: transparent;
                backdrop-filter: none;
            }

            .precise-countdown {
                grid-template-columns: 1fr;
            }

            .time-card {
                padding: 0.95rem 0.8rem;
            }

            #paragraph-symbols {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div id="paragraph-symbols"></div>
    <div class="bg-pattern"></div>

    <main class="container">
        <h1>E2A-Countdown</h1>

        <section class="countdown" id="countdown">
            <article class="countdown-item">
                <span class="countdown-label">Lage</span>
                <span class="countdown-value" id="days">--</span>
                <span class="unit-label">verbleibende Schultage bis einschließlich 23.06.</span>
            </article>

            <article class="countdown-item">
                <span class="countdown-label">Lage gesamt</span>
                <span class="countdown-value" id="totalDays">--</span>
                <span class="unit-label">Kalendertage bis einschließlich 23.06.</span>
            </article>

            <div class="precise-countdown" id="preciseCountdown" aria-live="polite"></div>

            <aside class="quote-box">
                <span class="quote-label">Motivation</span>
                <p class="quote-text" id="quoteText"></p>
            </aside>
        </section>
    </main>

    <script>
        (function fireworkCanvas() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d', '#00d4aa', '#c084fc'];
            let lastFirework = 0;

            window.setFireworksActive = (active) => {
                canvas.classList.toggle('active', active);
            };

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resize();
            window.addEventListener('resize', resize);

            function createFirework(x, y) {
                const count = 60 + Math.floor(Math.random() * 40);
                const color = colors[Math.floor(Math.random() * colors.length)];
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                    const speed = 3 + Math.random() * 4;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        color,
                        life: 1,
                        decay: 0.012 + Math.random() * 0.008
                    });
                }
            }

            function animate() {
                if (!canvas.classList.contains('active')) {
                    requestAnimationFrame(animate);
                    return;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const now = Date.now();

                if (now - lastFirework > 1200) {
                    const x = canvas.width * 0.2 + Math.random() * canvas.width * 0.6;
                    const y = canvas.height * 0.2 + Math.random() * canvas.height * 0.4;
                    createFirework(x, y);
                    lastFirework = now;
                }

                particles = particles.filter((p) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.08;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life -= p.decay;

                    if (p.life <= 0) {
                        return false;
                    }

                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    return true;
                });

                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            animate();
        })();

        (function paragraphSymbols() {
            if (window.innerWidth <= 640) {
                return;
            }

            const container = document.getElementById('paragraph-symbols');
            const colors = [
                'rgba(255,255,255,0.2)',
                'rgba(0,212,170,0.15)',
                'rgba(255,107,107,0.12)',
                'rgba(77,150,255,0.12)'
            ];
            const symbols = ['§', '⛓'];

            function createSymbol() {
                const span = document.createElement('span');
                span.className = 'para-symbol';
                span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (10 + Math.random() * 8) + 's';
                span.style.animationDelay = -Math.random() * 15 + 's';
                span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                span.style.color = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(span);
                setTimeout(() => span.remove(), 20000);
            }

            setInterval(createSymbol, 800);
            for (let i = 0; i < 15; i++) {
                setTimeout(createSymbol, i * 200);
            }
        })();

        const COUNTDOWN_DATES = [
            { day: 5, month: 3 }, { day: 6, month: 3 }, { day: 9, month: 3 }, { day: 10, month: 3 },
            { day: 11, month: 3 }, { day: 12, month: 3 }, { day: 13, month: 3 }, { day: 30, month: 3 },
            { day: 31, month: 3 }, { day: 1, month: 4 }, { day: 2, month: 4 }, { day: 3, month: 4 },
            { day: 7, month: 4 }, { day: 8, month: 4 }, { day: 9, month: 4 }, { day: 10, month: 4 },
            { day: 27, month: 4 }, { day: 28, month: 4 }, { day: 29, month: 4 }, { day: 30, month: 4 },
            { day: 4, month: 5 }, { day: 5, month: 5 }, { day: 6, month: 5 }, { day: 7, month: 5 },
            { day: 8, month: 5 }, { day: 26, month: 5 }, { day: 27, month: 5 }, { day: 28, month: 5 },
            { day: 29, month: 5 }, { day: 1, month: 6 }, { day: 2, month: 6 }, { day: 3, month: 6 },
            { day: 22, month: 6 }, { day: 23, month: 6 }
        ];

        const MS_PER_DAY = 1000 * 60 * 60 * 24;

        function getLastSchoolDayThisYear() {
            const now = new Date();
            return new Date(now.getFullYear(), 5, 23);
        }

        function getExamDateThisYear() {
            const now = new Date();
            return new Date(now.getFullYear(), 5, 24);
        }

        function getCalendarDaysInclusiveUntil2306() {
            const now = new Date();
            const nowMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const examDate = getExamDateThisYear();

            if (nowMidnight.getTime() >= examDate.getTime()) return 0;
            return Math.ceil((examDate - nowMidnight) / MS_PER_DAY);
        }

        const SCHOOL_START = 7 * 60 + 30;
        const SCHOOL_END = 16 * 60 + 30;
        const SCHOOL_MINUTES_PER_DAY = 9 * 60;

        function getRemainingSchoolSeconds() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const nowMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const lastDay = getLastSchoolDayThisYear();

            if (nowMidnight.getTime() > lastDay.getTime()) return 0;

            let totalSeconds = 0;
            const nowMinutes = now.getHours() * 60 + now.getMinutes();
            const nowSeconds = now.getSeconds();

            for (const d of COUNTDOWN_DATES) {
                const dateThisYear = new Date(currentYear, d.month - 1, d.day);
                dateThisYear.setHours(0, 0, 0, 0);

                if (dateThisYear.getTime() < nowMidnight.getTime()) continue;
                if (dateThisYear.getTime() > lastDay.getTime()) break;

                const isToday = dateThisYear.getTime() === nowMidnight.getTime();

                if (isToday) {
                    if (nowMinutes < SCHOOL_START) {
                        totalSeconds += SCHOOL_MINUTES_PER_DAY * 60;
                    } else if (nowMinutes < SCHOOL_END) {
                        const remainingMinutes = (SCHOOL_END - nowMinutes) * 60 - nowSeconds;
                        totalSeconds += Math.max(0, remainingMinutes);
                    }
                } else {
                    totalSeconds += SCHOOL_MINUTES_PER_DAY * 60;
                }
            }

            return Math.floor(totalSeconds);
        }

        function getRemainingDays() {
            const now = new Date();
            const nowMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const lastDay = getLastSchoolDayThisYear();

            if (nowMidnight.getTime() > lastDay.getTime()) {
                return 0;
            }

            const currentYear = now.getFullYear();
            const totalCountdownDays = COUNTDOWN_DATES.length;

            for (let i = 0; i < COUNTDOWN_DATES.length; i++) {
                const d = COUNTDOWN_DATES[i];
                const dateThisYear = new Date(currentYear, d.month - 1, d.day);
                dateThisYear.setHours(0, 0, 0, 0);
                if (dateThisYear.getTime() === nowMidnight.getTime()) {
                    return totalCountdownDays - i;
                }
            }

            let nextIndex = -1;
            for (let i = 0; i < COUNTDOWN_DATES.length; i++) {
                const d = COUNTDOWN_DATES[i];
                const dateThisYear = new Date(currentYear, d.month - 1, d.day);
                dateThisYear.setHours(0, 0, 0, 0);
                if (dateThisYear.getTime() > nowMidnight.getTime()) {
                    nextIndex = i;
                    break;
                }
            }

            if (nextIndex >= 0) {
                return totalCountdownDays - nextIndex;
            }

            return 0;
        }

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function getIntensityColor(remaining) {
            if (remaining > 30) return '#00d4aa';
            if (remaining > 20) return '#22e8c4';
            if (remaining > 10) return '#ffd93d';
            if (remaining > 5) return '#ff9f43';
            if (remaining > 0) return '#ff6b6b';
            return '#ff3333';
        }

        function updateCountdown() {
            const remaining = getRemainingDays();
            const daysEl = document.getElementById('days');
            daysEl.textContent = remaining;

            if (typeof window.setFireworksActive === 'function') {
                window.setFireworksActive(remaining === 0);
            }

            const intensityColor = getIntensityColor(remaining);
            daysEl.style.color = intensityColor;

            const totalDaysEl = document.getElementById('totalDays');
            const totalDays = getCalendarDaysInclusiveUntil2306();
            totalDaysEl.textContent = totalDays;
            totalDaysEl.style.color = intensityColor;

            const totalSeconds = getRemainingSchoolSeconds();
            const preciseEl = document.getElementById('preciseCountdown');

            if (totalSeconds <= 0) {
                preciseEl.innerHTML = '';
                return;
            }

            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            preciseEl.innerHTML = `
                <div class="time-card">
                    <span class="time-value" style="color:${intensityColor}">${hours}</span>
                    <span class="time-label">Schulstunden</span>
                </div>
                <div class="time-card">
                    <span class="time-value" style="color:${intensityColor}">${pad(minutes)}</span>
                    <span class="time-label">Minuten</span>
                </div>
                <div class="time-card">
                    <span class="time-value" style="color:${intensityColor}">${pad(seconds)}</span>
                    <span class="time-label">Sekunden</span>
                </div>
            `;
        }

        const MOTIVATING_QUOTES = [
            'Der Erfolg ist die Summe kleiner Anstrengungen, die Tag für Tag wiederholt werden.',
            'Du schaffst das – glaub an dich!',
            'Jede Stunde, die du investierst, bringt dich deinem Ziel näher.',
            'Der schwierigste Schritt ist oft der erste. Du hast ihn bereits gemacht.',
            'Lernen ist wie Rudern gegen den Strom – sobald man aufhört, treibt man zurück.',
            'Deine Mühe wird sich auszahlen. Bleib dran!',
            'Große Dinge entstehen aus kleinen Schritten.',
            'Du bist stärker, als du denkst.',
            'Jeder Tag ist eine neue Chance, etwas zu erreichen.',
            'Disziplin ist die Brücke zwischen Zielen und Erfolg.',
            'Der Weg zum Erfolg führt durch Fleiß und Ausdauer.',
            'Gib niemals auf – du bist näher dran, als du glaubst.',
            'Was du heute lernst, trägt morgen Früchte.',
            'Dein Einsatz zeigt, wer du bist. Mach weiter so!',
            'Erfolg kommt zu denen, die nicht aufgeben.',
            'Jede Minute zählt – nutze sie weise.',
            'Du hast schon so viel geschafft. Das letzte Stück schaffst du auch.',
            'Vertraue dem Prozess. Du bist auf dem richtigen Weg.',
            'Starke Menschen schaffen starke Ergebnisse.',
            'Dein Ziel ist in Reichweite – bleib fokussiert.',
            'Lernen ist der Schlüssel zu allem, was du erreichen willst.',
            'Du bist bereit. Zeig, was du kannst!',
            'Kleine Fortschritte sind immer noch Fortschritte.',
            'Deine Zukunft beginnt mit dem, was du heute tust.',
            'Hartnäckigkeit schlägt Talent, wenn Talent nicht hartnäckig ist.',
            'Du hast die Kraft, alles zu erreichen, was du dir vornimmst.',
            'Jeder Meister war einmal ein Anfänger.',
            'Dein Einsatz wird belohnt – glaub daran.',
            'Der Countdown läuft – und du bist bereit.',
            'Heute investieren, morgen ernten.',
            'Du bist auf dem Weg. Der Rest ist nur noch Durchhalten.',
            'Erfolg ist kein Zufall – er ist harte Arbeit.',
            'Deine Grenzen setzt nur du selbst.',
            'Jeder Tag bringt dich deinem Traum näher.',
            'Du hast es bis hierher geschafft – du schaffst auch den Rest.'
        ];

        (function showRandomQuote() {
            const quoteEl = document.getElementById('quoteText');
            const randomIndex = Math.floor(Math.random() * MOTIVATING_QUOTES.length);
            quoteEl.textContent = MOTIVATING_QUOTES[randomIndex];
        })();

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
